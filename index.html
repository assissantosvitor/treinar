<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netshoes - Cadastro de Membro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-details">
        <div class="circle one"></div>
        <div class="circle two"></div>
        <div class="shape three"></div>
    </div>

    <div class="container">
        <form id="form-cadastro">
            <div class="logo">NETSHOES</div>
            <h2>CADASTRO DE CLIENTE</h2>
            <p>Faça seu login para aproveitar as ofertas exclusivas.</p>

            <div class="input-group">
                <input type="text" id="nome" placeholder="Nome Completo" required>
            </div>

            <div class="row">
                <input type="text" id="cpf" placeholder="CPF" maxlength="14" required>
                <input type="date" id="nascimento" required>
            </div>

            <div class="input-group">
                <input type="email" id="email" placeholder="E-mail" required>
            </div>

            <div class="row">
                <select id="genero" required>
                    <option value="" disabled selected>Gênero</option>
                    <option value="M">Masculino</option>
                    <option value="F">Feminino</option>
                    <option value="Trans">Transgênero</option>
                    <option value="Neutro">Gênero Neutro</option>
                    <option value="Homossexual">Homossexual</option>
                    <option value="Therian">Therian</option>
                    <option value="Outro">Outro</option>
                </select>
                <input type="tel" id="telefone" placeholder="Telefone">
            </div>

            <button type="submit">CONTINUAR</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
